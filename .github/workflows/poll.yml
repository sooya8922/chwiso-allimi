name: poll-yeyak

# 5분마다 자동 폴링 (GitHub Actions cron 최소 간격 5분, 다소 지연될 수 있음)
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}   # 수동 실행 버튼도 제공

# 동시 실행 방지 (DB 충돌 방지)
concurrency:
  group: poll
  cancel-in-progress: false

permissions:
  contents: write   # 결과를 레포에 커밋하기 위해 필요

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Poll yeyak
        env:
          SEOUL_API_KEY: ${{ secrets.SEOUL_API_KEY }}
          CATEGORIES: education,culture   # 선착순 모집형만 (시설형 제외)
        run: python3 poller.py

      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add chwiso.db transitions.jsonl
          git commit -m "poll $(date -u +%FT%TZ)" || echo "변화 없음 - 커밋 스킵"
          git push || echo "push 실패 (다음 회차에 재시도)"
